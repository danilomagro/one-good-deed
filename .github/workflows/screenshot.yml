name: Hourly Screenshot

on:
  schedule:
    - cron: '0 * * * *'  # every hour, on the hour
  workflow_dispatch:       # allow manual trigger

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          mkdir -p screenshots
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            await page.goto('https://danilomagro.github.io/one-good-deed/', { waitUntil: 'networkidle' });
            await page.waitForTimeout(4000);
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            await page.screenshot({ path: 'screenshots/' + ts + '.png', fullPage: false });
            await browser.close();
            console.log('Screenshot saved: ' + ts + '.png');
          })();
          "

      - name: Commit screenshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git diff --staged --quiet || git commit -m "📸 hourly snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
